services:
  codextrader:
    build: .
    container_name: codextrader
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8512}:8512"
    volumes:
      - ./output:/app/output
      - ./data:/app/data
      - ./config:/app/config
      - ./.env:/app/.env:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALPHAVANTAGE_API_KEY=${ALPHAVANTAGE_API_KEY}
      - FMP_API_KEY=${FMP_API_KEY}
      - SEC_USER_AGENT=${SEC_USER_AGENT}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-8512}
      - TRADE_PROVIDER=${TRADE_PROVIDER:-local}
      - SCHEDULE_SCENARIOS=${SCHEDULE_SCENARIOS:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - SCHEDULE_TIME=${SCHEDULE_TIME:-16:35}
      - SCHEDULE_TIMEZONE=${SCHEDULE_TIMEZONE:-America/New_York}
